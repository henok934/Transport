{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wedehager Transport{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        /* 2. THE SECRET: Hide the page content if a language is already selected */
        .js-loading-lang body {
            visibility: hidden !important;
            opacity: 0 !important;
        }

        /* Prevent Google Translate from shifting the layout */
        body { top: 0px !important; position: static !important; }
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget { display: none !important; }
        .goog-text-highlight { background: none !important; box-shadow: none !important; }
    </style>

    <script>
        // 3. IMMEDIATE CHECK: Run this before the body even loads
        (function() {
            const savedLang = localStorage.getItem("userLanguage");
            if (savedLang && savedLang !== "en") {
                // Add the class to hide the page immediately
                document.documentElement.classList.add('js-loading-lang');
            }
        })();
    </script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="{% url 'home' %}">WEDEHAGER</a>

            <div id="google_translate_element" style="display:none;"></div>

            <ul class="navbar-nav ml-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="langDrop" data-toggle="dropdown">
                        Language
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <button class="dropdown-item" onclick="changeLanguage('en')">English</button>
                        <button class="dropdown-item" onclick="changeLanguage('am')">አማርኛ (Amharic)</button>
                        <button class="dropdown-item" onclick="changeLanguage('om')">Afaan Oromoo</button>
                        <button class="dropdown-item" onclick="changeLanguage('ti')">ትግርኛ (Tigrinya)</button>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="text/javascript">
        // 4. Initialize Engine
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,am,om,ti',
                autoDisplay: false
            }, 'google_translate_element');
        }

        // 5. Manual Change Function
        function changeLanguage(langCode) {
            localStorage.setItem("userLanguage", langCode);
            const selectField = document.querySelector('.goog-te-combo');
            if (selectField) {
                selectField.value = langCode;
                selectField.dispatchEvent(new Event('change'));
            }
            // Ensure page is visible after manual change
            document.documentElement.classList.remove('js-loading-lang');
        }

        // 6. AUTO-SYNC LOGIC (MutationObserver is faster than timers)
        (function() {
            const savedLang = localStorage.getItem("userLanguage");
            if (!savedLang || savedLang === "en") {
                document.documentElement.classList.remove('js-loading-lang');
                return;
            }

            const observer = new MutationObserver((mutations, obs) => {
                const selectField = document.querySelector('.goog-te-combo');
                if (selectField) {
                    selectField.value = savedLang;
                    selectField.dispatchEvent(new Event('change'));

                    // Delay reveal slightly so the text swap finishes first
                    setTimeout(() => {
                        document.documentElement.classList.remove('js-loading-lang');
                    }, 100);

                    obs.disconnect();
                }
            });

            observer.observe(document.documentElement, { childList: true, subtree: true });
